<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Negroni</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <h1>Negroni</h1>
    <img src="../images/negroni.jpg" alt="A picture of a negroni">
    <h2>Description</h2>
    <p>This simple, bitter cocktail should be a staple of any home bar</p>
    <h2>Ingredients</h2>
    <ul>
        <li>One shot gin</li>
        <li>One shot Italian red bitters</li>
        <li>One shot sweet vermouth</li>
    </ul>
    <h2>How to make</h2>
    <ol>
        <li>Pour all ingredients into an ice filled glass</li>
        <li>Stir</li>
        <li>Garnish with an orange twist or slice</li>
    </ol>
</body>
</html>
