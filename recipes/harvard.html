<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harvard</title>
</head>
<body>
    <h1>Harvard</h1>
    <img src="../images/harvard.jpg" alt="A picture of a Harvard cocktail">
    <h2>Description</h2>
    <p>An old school classic</p>
    <h2>Ingredients</h2>
    <ul>
        <li>One shot brandy</li>
        <li>One shot sweet vermouth</li>
        <li>2 dash Angostura bitters</li>
    </ul>
    <h2>How to make</h2>
    <ol>
        <li>Pour all ingredients into a mixing glass with ice</li>
        <li>Stir</li>
        <li>Strain into a chilled glass</li>
        <li>Garnish with an orange twist</li>
    </ol>
</body>
</html>
